apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: akm
  namespace: auth
spec:
  releaseName: akm
  chart:
    spec:
      chart: akm
      version: 0.13.2
      sourceRef:
        kind: HelmRepository
        name: akm-registry
        namespace: flux-system
  interval: 6m
  install:
    remediation:
      retries: 7
  upgrade:
    remediation:
      retries: 7
  values:
    postgresql:
      image:
        registry: docker.io
        repository: bitnamilegacy/postgresql
        tag: "16.6.0"
    redis:
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
        tag: "7.2.5"
